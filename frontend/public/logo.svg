<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44" width="180" height="44" role="img" aria-label="VuKia logo">
  <title>VuKia</title>

  <!-- Speed/road accent: abstract forward-motion chevron strip -->
  <g aria-hidden="true">
    <!-- Chevron 1 (leftmost, lightest) -->
    <polygon points="4,22 11,14 14,14 7,22 14,30 11,30" fill="#1e3a5f" opacity="0.25"/>
    <!-- Chevron 2 -->
    <polygon points="10,22 17,14 20,14 13,22 20,30 17,30" fill="#1e3a5f" opacity="0.55"/>
    <!-- Chevron 3 (rightmost, solid) -->
    <polygon points="16,22 23,14 26,14 19,22 26,30 23,30" fill="#e8491d" opacity="1"/>
  </g>

  <!-- Wordmark -->
  <!-- "Vu" in deep navy blue -->
  <text
    x="34"
    y="32"
    font-family="'Arial Black', 'Arial', 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="26"
    fill="#1e3a5f"
    letter-spacing="-0.5"
  >Vu</text>

  <!-- "Kia" in warm orange -->
  <text
    x="82"
    y="32"
    font-family="'Arial Black', 'Arial', 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="26"
    fill="#e8491d"
    letter-spacing="-0.5"
  >Kia</text>

  <!-- Thin underline accent bar: navy left half, orange right half -->
  <rect x="34" y="36" width="48" height="2.5" rx="1.25" fill="#1e3a5f"/>
  <rect x="82" y="36" width="64" height="2.5" rx="1.25" fill="#e8491d"/>
</svg>
