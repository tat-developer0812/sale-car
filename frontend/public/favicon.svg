<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="VuKia favicon">
  <title>VuKia</title>

  <!-- Rounded square background: left half navy, right half orange -->
  <!-- Navy left half -->
  <path
    d="M4,4 L16,4 L16,28 L4,28 Q2,28 2,26 L2,6 Q2,4 4,4 Z"
    fill="#1e3a5f"
  />
  <!-- Orange right half -->
  <path
    d="M16,4 L28,4 Q30,4 30,6 L30,26 Q30,28 28,28 L16,28 Z"
    fill="#e8491d"
  />

  <!-- "V" letter centred, white, bold -->
  <!-- Using a geometric V shape for crispness at small sizes -->
  <text
    x="16"
    y="23"
    font-family="'Arial Black', 'Arial', 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="20"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
  >V</text>
</svg>
