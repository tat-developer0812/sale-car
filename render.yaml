services:
  - type: web
    name: vukia-strapi
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /_health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: vukia-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_PROVIDER
        value: cloudinary
      - key: CLOUDINARY_NAME
        value: tatdevweb
      - key: CLOUDINARY_KEY
        value: "142823899849367"
      - key: CLOUDINARY_SECRET
        sync: false

databases:
  - name: vukia-db
    plan: free
    databaseName: vukia
    user: vukia
